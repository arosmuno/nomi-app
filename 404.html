<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina no encontrada - Nomi</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#fafaf9;color:#1c1917;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:48px}
.logo-mark{width:36px;height:36px;background:#2563eb;border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-size:20px;font-weight:800}
.logo-name{font-size:20px;font-weight:700;color:#1c1917}
.code{font-size:96px;font-weight:800;line-height:1;background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-4px;margin-bottom:16px}
h1{font-size:24px;font-weight:700;margin-bottom:10px}
p{color:#78716c;font-size:15px;max-width:360px;line-height:1.6;margin-bottom:32px}
.actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;padding:10px 22px;border-radius:10px;text-decoration:none;font-family:inherit}
.btn-primary{background:#2563eb;color:#fff}
.btn-outline{background:#fff;color:#1c1917;border:1.5px solid #e7e5e4}
</style>
</head>
<body>
<a href="index.html" class="logo"><div class="logo-mark">N</div><div class="logo-name">Nomi</div></a>
<div class="code">404</div>
<h1>Pagina no encontrada</h1>
<p>La pagina que buscas no existe o ha sido movida.</p>
<div class="actions">
<a href="index.html" class="btn btn-primary">Volver al inicio</a>
<a href="nomi-app.html" class="btn btn-outline">Ir a mi cuenta</a>
</div>
</body>
</html>
